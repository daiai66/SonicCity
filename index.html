<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SonicCity</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #020711;
      color: #25f4ee;
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 12vw, 84px);
      line-height: 1;
      font-weight: 950;
    }

    p {
      margin: 16px 0 0;
      color: rgba(255, 255, 255, .78);
      font-size: 15px;
      line-height: 1.7;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      min-width: 130px;
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      color: #fff;
      padding: 12px 16px;
      text-decoration: none;
      font-weight: 850;
    }
  </style>
  <script>
    (function () {
      var isMobile = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
      window.location.replace(isMobile ? "SonicCity-mobile.html" : "SonicCity.html");
    })();
  </script>
</head>
<body>
  <main>
    <h1>SonicCity</h1>
    <p>正在为你的设备选择合适版本。</p>
    <div class="links">
      <a href="SonicCity-mobile.html">手机版</a>
      <a href="SonicCity.html">电脑版</a>
    </div>
  </main>
</body>
</html>
